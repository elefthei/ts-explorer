<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TypeScript Explorer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><span class="brand-mark">TS</span><div><strong>Project Explorer</strong><small id="source-label">Loading source…</small></div></div>
      <nav class="modes" aria-label="Workspace view"><button id="packages-mode" class="mode active" type="button">Packages</button><button id="uml-mode" class="mode" type="button">UML</button><button id="editor-mode" class="mode" type="button">Editor</button></nav>
      <div class="top-actions"><div class="definition-search"><input id="node-search" type="search" placeholder="Search classes, methods, files…" aria-label="Search classes, methods, and files" /><div id="definition-results" class="definition-results" role="listbox" aria-label="Definition results" hidden></div></div><label class="search-case-toggle"><input id="search-case-insensitive" type="checkbox">Case Insensitive</label><span id="status" class="status">Starting watcher…</span><button id="zoom-out" type="button" title="Zoom out">−</button><button id="zoom-in" type="button" title="Zoom in">+</button><button id="zoom-reset" type="button" title="Reset diagram view">Reset</button><button id="legend-toggle" type="button" title="Toggle legend">Legend</button></div>
    </header>
    <main class="workspace">
      <aside class="sidebar" id="sidebar"><div class="sidebar-head"><h2>Files</h2><button id="sidebar-toggle" type="button" aria-label="Collapse file tree" aria-expanded="true">‹</button></div><input id="tree-filter" type="search" placeholder="Filter files…" aria-label="Filter files" /><div id="tree" class="tree" role="tree"></div></aside>
      <section id="graph-panel" class="graph-panel"><div id="error-panel" class="error-panel" hidden></div><section id="diagram-stage" class="diagram-stage" aria-label="Diagram viewport"><div id="svg-holder" class="svg-holder"></div><div id="diagram-loading" class="diagram-loading" role="status" aria-live="polite" aria-atomic="true" hidden>Loading...</div></section><details id="raw-dsl"><summary>Raw Mermaid DSL</summary><pre id="dsl-content"></pre></details><div id="legend" class="legend" hidden><span><i class="swatch interface"></i>Interface</span><span><i class="swatch abstract"></i>Abstract</span><span><i class="swatch concrete"></i>Concrete</span><span><i class="swatch type"></i>Type</span><span><i class="swatch enum"></i>Enum</span><span><i class="swatch test"></i>Test</span></div></section>
      <section id="editor-panel" class="editor-panel" hidden><div id="editor-empty" class="editor-empty">Select a file from the tree to open it.</div><div id="editor-content" class="editor-content" hidden><div class="editor-head"><div><strong id="editor-name">File</strong><small id="editor-path"></small></div><button id="editor-close" type="button" aria-label="Close editor">×</button></div><div id="editor" class="editor"></div></div><div id="editor-loading" class="editor-loading" role="status" aria-live="polite" aria-atomic="true" hidden>Loading...</div></section>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
